name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Validate shell scripts
        run: |
          bash -n lab docker/common/configure-image.sh docker/common/init-lab
          find .devcontainer checks drills runtime tests -type f -name '*.sh' -print0 | xargs -0 -r -n1 bash -n
      - name: Validate application configuration
        run: |
          python3 -m py_compile runtime/rescue-web.py
          python3 -m json.tool runtime/rescue-web-config.json >/dev/null
      - name: Validate repository architecture
        run: python3 tests/repository-contract.py
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $null = [scriptblock]::Create((Get-Content -Raw ./lab.ps1))
      - name: Validate wrapper catalogue parity
        run: |
          bash ./lab drills > /tmp/lab-drills.bash
          pwsh -NoLogo -NoProfile -File ./lab.ps1 drills > /tmp/lab-drills.pwsh
          diff --unified /tmp/lab-drills.bash /tmp/lab-drills.pwsh
      - name: Validate Codespaces contract
        run: python3 tests/codespaces-config.py
      - name: Validate release image CI contract
        run: |
          python3 -m py_compile tests/companion-platforms.py
          python3 tests/release-ci-config.py
      - name: Validate usability evidence tooling
        run: |
          python3 -m py_compile tests/usability-evidence.py tests/usability-evidence-unit.py
          python3 tests/usability-evidence-unit.py
          python3 tests/usability-ci-config.py
      - name: Validate Compose model
        run: docker compose --project-name lsr --file compose.yaml config --quiet

  smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [ubuntu, debian, rocky]
    steps:
      - uses: actions/checkout@v6
      - name: Run complete incident suite on ${{ matrix.distro }}
        run: bash ./tests/smoke.sh "${{ matrix.distro }}"

  codespaces:
    name: Codespaces smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build the dev container and run the Ubuntu incident suite
        uses: devcontainers/ci@v0.3
        with:
          push: never
          runCmd: bash .devcontainer/post-create.sh && bash ./tests/smoke.sh ubuntu
